<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" role="img" aria-label="ktayl-solution mark">
  <defs>
    <clipPath id="shield-clip">
      <path d="M8 4h48v24c0 17-10 32-24 40C18 60 8 45 8 28V4z"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <path d="M8 4h48v24c0 17-10 32-24 40C18 60 8 45 8 28V4z" fill="#00375A"/>

  <!-- Top accent bar -->
  <rect x="8" y="4" width="48" height="4" fill="#E8690B"/>

  <!-- K mark clipped to shield -->
  <g clip-path="url(#shield-clip)">
    <!-- K: vertical bar -->
    <rect x="16" y="12" width="9" height="50" rx="2" fill="white"/>
    <!-- K: upper arm (white) -->
    <line x1="24" y1="36" x2="52" y2="12" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <!-- K: lower arm (orange) -->
    <line x1="24" y1="36" x2="50" y2="60" stroke="#E8690B" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
