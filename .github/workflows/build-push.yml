name: Build & Push to Harbor

on:
  push:
    branches: [main, staging, dev]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "main" ]; then
            TAG="${SHA}"
          else
            TAG="${BRANCH}-${SHA}"
          fi
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.devandre.sbs
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: harbor.devandre.sbs/library/ktayl-solution-web:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: harbor.devandre.sbs/library/ktayl-solution-web:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        if: github.ref_name != 'dev'
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        if: github.ref_name == 'main'
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        if: github.ref_name == 'main'
        run: |
          syft harbor.devandre.sbs/library/ktayl-solution-web@${{ steps.build.outputs.digest }} \
            -o cyclonedx-json=sbom.json

      - name: Sign image (keyless — GitHub OIDC → Sigstore Fulcio)
        if: github.ref_name != 'dev'
        run: |
          cosign sign --yes \
            harbor.devandre.sbs/library/ktayl-solution-web@${{ steps.build.outputs.digest }}

      - name: Attach SBOM to image as OCI referrer
        if: github.ref_name == 'main'
        run: |
          cosign attach sbom \
            --sbom sbom.json \
            --type cyclonedx \
            harbor.devandre.sbs/library/ktayl-solution-web@${{ steps.build.outputs.digest }}

      - name: Import GPG signing key
        if: github.ref_name == 'main'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true

      - name: Bump image tag in minicloud-gitops (main only)
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          NEW_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config --global user.name  "AndreLiar"
          git config --global user.email "andrelaurelyvan.kanmegnetabouguie@ynov.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/andrelair-platform/minicloud-gitops.git" /tmp/gitops
          cd /tmp/gitops
          sed -i "s|harbor.10.0.0.200.nip.io/library/ktayl-solution-web:.*|harbor.10.0.0.200.nip.io/library/ktayl-solution-web:${NEW_TAG}|" \
            manifests/ktayl-solution-web/00-deployment.yaml
          git add manifests/ktayl-solution-web/00-deployment.yaml
          if git diff --cached --quiet; then
            echo "No change — image already at ${NEW_TAG}"
            exit 0
          fi
          git commit -S -m "ci(ktayl-solution-web): bump image to ${NEW_TAG}"
          git push origin main
