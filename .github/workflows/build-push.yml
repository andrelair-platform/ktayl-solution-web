name: Build & Push to Harbor

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.10.0.0.200.nip.io
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: harbor.10.0.0.200.nip.io/library/ktayl-solution-web:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tag in minicloud-gitops
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          NEW_TAG: ${{ steps.sha.outputs.short }}
        run: |
          git config --global user.name  "AndreLair"
          git config --global user.email "andrelairelyvan.kanmegnetabouguie@ynov.com"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/andrelair-platform/minicloud-gitops.git" /tmp/gitops
          cd /tmp/gitops
          sed -i "s|harbor.10.0.0.200.nip.io/library/ktayl-solution-web:.*|harbor.10.0.0.200.nip.io/library/ktayl-solution-web:${NEW_TAG}|" \
            manifests/ktayl-solution-web/00-deployment.yaml
          git add manifests/ktayl-solution-web/00-deployment.yaml
          git commit -m "ci(ktayl-solution-web): bump image to ${NEW_TAG}"
          git push origin main
